<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe · DRENAnalamanga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-container {
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            width: 450px;
            max-width: 100%;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }
        .logo { text-align: center; margin-bottom: 1rem; }
        .logo h1 { font-size: 1.8rem; color: #1E3A2F; }
        .logo span { color: #D69E2E; }
        .form-title { text-align: center; font-size: 1.4rem; margin-bottom: 1.5rem; color: #2D3748; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 500; color: #4A5568; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #D69E2E; }
        input {
            width: 100%;
            padding: 12px 12px 12px 44px;
            border: 1.5px solid #E2E8F0;
            border-radius: 40px;
            font-size: 0.95rem;
            background: #F8FAFC;
        }
        input:focus { outline: none; border-color: #1E3A2F; background: white; }
        .btn-reset {
            width: 100%;
            padding: 12px;
            background: #1E3A2F;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-reset:hover { background: #2D6A4F; transform: translateY(-2px); }
        .errorlist { list-style: none; color: #DC2626; font-size: 0.8rem; margin-top: 0.2rem; }
        .links { text-align: center; margin-top: 1rem; }
        .links a { color: #1E3A2F; text-decoration: none; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo">
            <h1>Édu<span>Collab</span></h1>
        </div>
        <div class="form-title">Nouveau mot de passe</div>

        {% if validlink %}
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Nouveau mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="new_password1" required>
                    </div>
                    {{ form.new_password1.errors }}
                </div>
                <div class="form-group">
                    <label>Confirmer</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="new_password2" required>
                    </div>
                    {{ form.new_password2.errors }}
                </div>
                <button type="submit" class="btn-reset">Changer mon mot de passe</button>
            </form>
        {% else %}
            <p style="color: #DC2626; text-align: center;">Le lien de réinitialisation est invalide ou a expiré.</p>
            <div class="links"><a href="{% url 'password_reset' %}">⤺ Demander un nouveau lien</a></div>
        {% endif %}
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
