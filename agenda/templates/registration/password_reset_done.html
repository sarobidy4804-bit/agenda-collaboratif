<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Email envoyé · ÉduCollab</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            width: 450px;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
        }
        .logo h1 { color: #1E3A2F; }
        .logo span { color: #D69E2E; }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        .title { font-size: 1.4rem; font-weight: 600; margin: 1rem 0; }
        .message { color: #718096; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #1E3A2F;
            color: white;
            border-radius: 40px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>DREN<span>Analamanga</span></h1>
        </div>
        <div class="icon">📧</div>
        <div class="title">Email envoyé</div>
        <div class="message">
            Un lien de réinitialisation vous a été envoyé.<br>
            Vérifiez votre boîte de réception (et vos spams).
        </div>
        <a href="{% url 'login' %}" class="btn">Retour à la connexion</a>
    </div>
</body>
</html>
